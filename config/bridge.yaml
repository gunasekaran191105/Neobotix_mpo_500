- ros_topic_name: "/neobotix_mpo_500/wheel_2/cmd_vel"
  gz_topic_name: "/neobotix_mpo_500/wheel_2/cmd_vel"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "ignition.msgs.Double"
  direction: ROS_TO_GZ

# Wheel 3 Visual Command
- ros_topic_name: "/neobotix_mpo_500/wheel_3/cmd_vel"
  gz_topic_name: "/neobotix_mpo_500/wheel_3/cmd_vel"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "ignition.msgs.Double"
